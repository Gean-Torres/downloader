<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DLPOD — Media Fetcher</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:       #08090a;
    --surface:  #0f1113;
    --border:   #1a1d21;
    --border2:  #25292e;
    --accent:   #00d4ff;
    --accent2:  #ff3b6b;
    --green:    #00ff88;
    --yellow:   #ffcc00;
    --text:     #e0e6ed;
    --muted:    #6b7a8d;
    --font-mono: 'JetBrains Mono', monospace;
    --font-disp: 'Bebas Neue', sans-serif;
    --radius:   2px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg);
  }

  .logo {
    font-family: var(--font-disp);
    font-size: 1.8rem;
    letter-spacing: 3px;
    color: var(--text);
  }

  .logo span { color: var(--accent); }

  .header-meta {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ── LAYOUT ── */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 400px 1fr;
    gap: 24px;
    max-width: 1200px;
    width: 100%;
    margin: 0 auto;
    padding: 24px;
  }

  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; padding: 16px; }
  }

  /* ── PANELS ── */
  .panel {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .section-title {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── FORM ── */
  .field { margin-bottom: 16px; }

  label {
    display: block;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  input[type=text], select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 8px 12px;
    border-radius: var(--radius);
    outline: none;
    transition: border-color 0.2s;
  }

  input[type=text]:focus, select:focus { border-color: var(--accent); }

  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* toggle */
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }

  .toggle-label { font-size: 11px; }

  .toggle {
    position: relative;
    width: 32px; height: 16px;
  }

  .toggle input { opacity: 0; width: 0; height: 0; }

  .toggle-track {
    position: absolute; inset: 0;
    background: var(--border2);
    border-radius: 16px;
    cursor: pointer;
  }

  .toggle input:checked + .toggle-track { background: var(--accent); }

  .toggle-track::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #fff;
    transition: transform 0.2s;
  }

  .toggle input:checked + .toggle-track::after { transform: translateX(16px); }

  /* ── BUTTON ── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 8px 16px;
    border-radius: var(--radius);
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--accent);
    color: #000;
    width: 100%;
  }

  .btn-primary:hover:not(:disabled) { opacity: 0.9; }
  .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border-color: var(--border);
  }

  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

  .btn-danger {
    color: var(--accent2);
    border-color: rgba(255,59,107,0.2);
  }

  .btn-danger:hover { background: rgba(255,59,107,0.1); }

  /* ── QUEUE ── */
  .job-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .job-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    transition: border-color 0.2s;
  }

  .job-card.running { border-left: 2px solid var(--accent); }
  .job-card.done    { border-left: 2px solid var(--green); }
  .job-card.error   { border-left: 2px solid var(--accent2); }
  .job-card.stopped { border-left: 2px solid var(--muted); }

  .job-info {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }

  .job-url {
    font-size: 12px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 80%;
  }

  .job-meta {
    display: flex;
    gap: 8px;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .job-meta span {
    background: var(--bg);
    padding: 2px 6px;
    border-radius: 2px;
  }

  /* progress */
  .progress-container {
    height: 4px;
    background: var(--bg);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 12px;
    position: relative;
  }

  .progress-bar {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s ease;
  }

  .job-card.done .progress-bar { background: var(--green); }
  .job-card.error .progress-bar { background: var(--accent2); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.8);
    display: none;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    width: 90%;
    max-width: 600px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
  }

  .modal-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .modal-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    background: #000;
    font-size: 11px;
    color: #888;
  }

  footer {
    padding: 12px 24px;
    font-size: 10px;
    color: var(--muted);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
  }
</style>
</head>
<body>

<header>
  <div style="display: flex; align-items: center; gap: 12px;">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 3V16M12 16L7 11M12 16L17 11" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M20 17.5C20 19.9853 18.2091 22 16 22H8C5.79086 22 4 19.9853 4 17.5" stroke="#e0e6ed" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M8 14.5C8 14.5 9 13 12 13C15 13 16 14.5 16 14.5" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    </svg>
    <div class="logo">DL<span>POD</span></div>
  </div>
  <div class="header-meta">Media Fetcher • Online</div>
</header>

<main>
  <div class="panel">
    <div>
      <div class="section-title">New Download</div>
      <div class="field">
        <label>URL</label>
        <input type="text" id="url-input" placeholder="YouTube or Spotify link..."/>
        <div id="url-info" style="margin-top: 4px; font-size: 10px; color: var(--accent); min-height: 14px;"></div>
      </div>

      <div class="row">
        <div class="field">
          <label>Format</label>
          <select id="fmt-select">
            <option value="mp3">mp3</option>
            <option value="mp4">mp4</option>
            <option value="opus">opus</option>
            <option value="best">best</option>
          </select>
        </div>
        <div class="field" id="quality-field">
          <label>Quality</label>
          <select id="quality-select"></select>
        </div>
      </div>

      <div class="field">
        <div class="toggle-row" style="margin-bottom: 8px;">
          <span class="toggle-label">Embed Metadata & Thumbnails</span>
          <label class="toggle">
            <input type="checkbox" id="embed-toggle" checked>
            <span class="toggle-track"></span>
          </label>
        </div>
        <div class="toggle-row">
          <span class="toggle-label">Auto-download when ready</span>
          <label class="toggle">
            <input type="checkbox" id="autodl-toggle">
            <span class="toggle-track"></span>
          </label>
        </div>
      </div>

      <button class="btn btn-primary" id="dl-btn">Fetch Media</button>
    </div>
  </div>

  <div class="panel">
    <div>
      <div class="section-title" style="justify-content: space-between;">
        <span>Active & Recent Jobs</span>
        <button class="btn btn-ghost" id="clear-btn" style="padding: 2px 8px; font-size: 9px;">Clear All</button>
      </div>
      <div class="job-list" id="job-list"></div>
    </div>
  </div>
</main>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <span style="font-size: 10px; text-transform: uppercase;">Job Log</span>
      <button class="btn btn-ghost" onclick="closeModal()" style="padding: 2px 8px;">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<footer>
  <span>DLPOD v1.1</span>
  <span>yt-dlp + spotdl</span>
</footer>

<script>
let jobs = {};
let pollInterval = null;
let modalJobId = null;

const urlInput = document.getElementById('url-input');
const urlInfo = document.getElementById('url-info');
const fmtSelect = document.getElementById('fmt-select');
const qualField = document.getElementById('quality-field');
const qualSelect = document.getElementById('quality-select');
const dlBtn = document.getElementById('dl-btn');
const embedToggle = document.getElementById('embed-toggle');
const autodlToggle = document.getElementById('autodl-toggle');

let currentTitle = '';
let infoTimeout = null;
let downloadedJobs = new Set();

function getSource(url) {
  if (!url) return 'yt';
  return url.includes('spotify.com') ? 'spotify' : 'yt';
}

async function fetchTitle() {
  const url = urlInput.value.trim();
  if (!url) {
    urlInfo.textContent = '';
    currentTitle = '';
    return;
  }

  urlInfo.textContent = 'Fetching info...';
  try {
    const res = await fetch('/api/info', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url }),
    });
    const data = await res.json();
    currentTitle = data.title || 'Unknown Media';
    const playlistText = data.is_playlist ? ' [PLAYLIST/ALBUM]' : '';
    urlInfo.textContent = `▶ ${currentTitle}${playlistText}`;
    if (data.is_playlist) {
      urlInfo.style.color = 'var(--yellow)';
    } else {
      urlInfo.style.color = 'var(--accent)';
    }
  } catch (e) {
    urlInfo.textContent = '⚠️ Could not fetch info';
    urlInfo.style.color = 'var(--accent2)';
    currentTitle = 'download';
  }
}

let formatsMetadata = null;

async function fetchMetadata() {
  try {
    const res = await fetch('/api/formats');
    formatsMetadata = await res.json();
    updateFormats();
  } catch (e) { console.error('Failed to fetch metadata:', e); }
}

function updateFormats() {
  if (!formatsMetadata) return;
  const url = urlInput.value.trim();
  const source = getSource(url);
  const currentFmt = fmtSelect.value;
  
  while (fmtSelect.options.length) fmtSelect.remove(0);
  
  const options = formatsMetadata[source] || [];
    
  options.forEach(fmt => fmtSelect.add(new Option(fmt, fmt)));
  
  // Try to restore previous format if it still exists
  if ([...fmtSelect.options].some(o => o.value === currentFmt)) {
    fmtSelect.value = currentFmt;
  }
  updateQualityVisibility();
}

function updateQualityVisibility() {
  if (!formatsMetadata) return;
  const fmt = fmtSelect.value;
  const qualities = formatsMetadata.qualities[fmt];

  // Only show quality if there are options for this format
  const showQuality = !!qualities;
  qualField.style.display = showQuality ? 'block' : 'none';

  if (showQuality) {
    const currentVal = qualSelect.value;
    while (qualSelect.options.length) qualSelect.remove(0);
    
    qualities.forEach(v => {
      const label = fmt === 'mp3' ? v + 'k' : (v === '2160' ? '4K' : v + 'p');
      qualSelect.add(new Option(label, v));
    });

    if ([...qualSelect.options].some(o => o.value === currentVal)) {
      qualSelect.value = currentVal;
    } else {
      // Default quality
      qualSelect.value = fmt === 'mp4' ? '720' : qualities[1] || qualities[0];
    }
  }
}

urlInput.addEventListener('input', () => {
  updateFormats();
  clearTimeout(infoTimeout);
  infoTimeout = setTimeout(fetchTitle, 800);
});
fmtSelect.addEventListener('change', updateQualityVisibility);

// Initialize on load
document.addEventListener('DOMContentLoaded', () => {
  fetchMetadata();
});

dlBtn.addEventListener('click', async () => {
  const url = urlInput.value.trim();
  if (!url) return;

  dlBtn.disabled = true;
  dlBtn.textContent = '...';

  try {
    const res = await fetch('/api/download', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        url,
        format: fmtSelect.value,
        quality: qualSelect.value || '192',
        title: currentTitle || 'download',
        embed_metadata: embedToggle.checked
      }),
    });
    const data = await res.json();
    if (data.job_id) {
      urlInput.value = '';
      urlInfo.textContent = '';
      currentTitle = '';
      fetchJobs();
    }
  } catch(e) { console.error(e); }
  finally {
    dlBtn.disabled = false;
    dlBtn.textContent = 'Fetch Media';
  }
});

async function fetchJobs() {
  try {
    const res = await fetch('/api/jobs');
    const data = await res.json();
    renderJobs(data);
    if (modalJobId) refreshModal();
    
    // Auto-download logic
    if (autodlToggle.checked) {
      data.forEach(job => {
        if (job.status === 'done' && !downloadedJobs.has(job.id)) {
          downloadedJobs.add(job.id);
          const link = document.createElement('a');
          link.href = `/api/jobs/${job.id}/download`;
          link.download = '';
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
        }
      });
    }

    // Dynamically adjust polling
    const hasActive = data.some(j => j.status === 'running');
    if (hasActive && (!pollInterval || pollInterval._ms !== 1000)) {
      startPolling(1000);
    } else if (!hasActive && pollInterval && pollInterval._ms !== 5000) {
      startPolling(5000);
    }
  } catch(e) { console.error(e); }
}

function startPolling(ms) {
  if (pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(fetchJobs, ms);
  pollInterval._ms = ms;
}

function renderJobs(list) {
  const container = document.getElementById('job-list');
  if (list.length === 0) {
    container.innerHTML = '<div style="color:var(--muted); font-size:11px; text-align:center; padding: 20px;">No jobs yet</div>';
    jobs = {};
    return;
  }

  // Remove stale jobs
  const currentIds = new Set(list.map(j => j.id));
  Object.keys(jobs).forEach(id => {
    if (!currentIds.has(id)) {
      const el = document.querySelector(`[data-id="${id}"]`);
      if (el) el.remove();
      delete jobs[id];
    }
  });

  list.forEach(job => {
    let el = document.querySelector(`[data-id="${job.id}"]`);
    const isNew = !el;
    
    if (isNew) {
      el = document.createElement('div');
      el.className = `job-card ${job.status}`;
      el.dataset.id = job.id;
      container.appendChild(el);
    }

    // Only update if something changed
    const old = jobs[job.id] || {};
    if (isNew || old.status !== job.status || old.progress !== job.progress) {
      el.className = `job-card ${job.status}`;
      el.innerHTML = `
        <div class="job-info">
          <div class="job-url" title="${job.title || job.url}">${job.title || job.url}</div>
          <div style="display: flex; gap: 4px;">
            <button class="btn btn-ghost" style="padding: 2px 6px; font-size: 9px;" onclick="showLog('${job.id}')">Log</button>
            ${job.status === 'running' ? `<button class="btn btn-ghost btn-danger" style="padding: 2px 6px; font-size: 9px;" onclick="stopJob('${job.id}')">Stop</button>` : ''}
            ${job.status === 'done' && job.serve_path ? `<a href="/api/jobs/${job.id}/download" class="btn btn-ghost" style="padding: 2px 6px; font-size: 9px; text-decoration:none;">Save</a>` : ''}
            ${job.status !== 'running' ? `<button class="btn btn-ghost btn-danger" style="padding: 2px 6px; font-size: 9px;" onclick="deleteJob('${job.id}')">✕</button>` : ''}
          </div>
        </div>
        <div class="job-meta">
          <span>${job.source}</span>
          <span>${job.format}</span>
          <span style="color: ${job.status === 'done' ? 'var(--green)' : job.status === 'error' ? 'var(--accent2)' : job.status === 'stopped' ? 'var(--muted)' : 'var(--yellow)'}">${job.status}</span>
        </div>
        <div class="progress-container">
          <div class="progress-bar" style="width: ${job.progress || 0}%"></div>
        </div>
      `;
    }
    jobs[job.id] = job;
  });
}

async function stopJob(id) {
  await fetch(`/api/jobs/${id}/stop`, { method: 'POST' });
  fetchJobs();
}

async function deleteJob(id) {
  await fetch(`/api/jobs/${id}`, { method: 'DELETE' });
  fetchJobs();
}

document.getElementById('clear-btn').addEventListener('click', async () => {
  const res = await fetch('/api/jobs');
  const list = await res.json();
  const toDelete = list.filter(j => j.status !== 'running');
  await Promise.all(toDelete.map(j => fetch(`/api/jobs/${j.id}`, { method: 'DELETE' })));
  fetchJobs();
});

async function showLog(id) {
  modalJobId = id;
  document.getElementById('modal').classList.add('open');
  refreshModal();
}

async function refreshModal() {
  if (!modalJobId) return;
  const res = await fetch(`/api/jobs/${modalJobId}/log`);
  const data = await res.json();
  const body = document.getElementById('modal-body');
  body.innerHTML = data.log.map(l => `<div>${l}</div>`).join('');
  body.scrollTop = body.scrollHeight;
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  modalJobId = null;
}

startPolling(2000);
fetchJobs();
</script>
</body>
</html>
